# .pre-commit-config.yaml
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0 # Use latest stable version
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
-   repo: https://github.com/psf/black
    rev: 24.3.0 # Use version matching your install
    hooks:
    -   id: black
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.7 # Use version matching your install
    hooks:
    -   id: ruff
        args: [--fix, --exit-non-zero-on-fix]
    -   id: ruff-format # Optional: Use ruff's formatter if preferred over black
-   repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.0.0 # Check for latest ESLint version supported
    hooks:
    -   id: eslint
        files: ^client/.*\.[jt]sx?$ # Target client JS/TS files
        types: [file]
        args: [--fix, --config, client/eslint.config.js]
-   repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8 # Check latest stable
    hooks:
    -   id: prettier
        files: ^client/.*\.(js|jsx|ts|tsx|css|json|html)$ # Target client files
